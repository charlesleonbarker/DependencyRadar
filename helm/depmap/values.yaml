image:
  repository: dependency-radar
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

# Mount a directory from the host node into the container at /repos.
# Leave empty to use the bundled fixture data.
repos:
  hostPath: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Extra environment variables passed to the container.
# Use these to override Dependency Radar config, e.g.:
#   env:
#     - name: DependencyRadar__IncludeTransitive
#       value: "false"
env: []
