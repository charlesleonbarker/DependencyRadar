<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Depmap</title>
  <style>/*__DEPMAP_CSS__*/</style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Depmap</h1>
        <div id="summary" class="muted"></div>
      </header>

      <section class="panel">
        <h2>Search</h2>
        <input id="search" type="search" placeholder="Project, package, repo…" autocomplete="off" />
      </section>

      <section class="panel">
        <h2>Layout</h2>
        <div class="segmented">
          <button data-layout="fcose" class="active">Force</button>
          <button data-layout="dagre">Hierarchical</button>
          <button data-layout="concentric">Concentric</button>
        </div>
        <label class="toggle">
          <input id="groupByRepo" type="checkbox" /> Group by repo
        </label>
      </section>

      <section class="panel">
        <h2>Filters</h2>
        <div id="kindFilters" class="checks"></div>
        <label class="toggle"><input id="showExternal" type="checkbox" checked /> Show external / unknown packages</label>
        <label class="toggle"><input id="showTransitive" type="checkbox" /> Show transitive package edges</label>
      </section>

      <section class="panel" id="selectionPanel" hidden>
        <h2>Selection</h2>
        <div id="selectionDetails"></div>
      </section>

      <section class="panel" id="testsPanel" hidden>
        <h2>Tests to run <span id="testsCount" class="pill"></span></h2>
        <ul id="testsList" class="paths"></ul>
      </section>

      <section class="panel" id="deployablesPanel" hidden>
        <h2>Deployables to smoke-test <span id="deployablesCount" class="pill"></span></h2>
        <ul id="deployablesList" class="paths"></ul>
      </section>

      <footer class="muted" id="footer"></footer>
    </aside>
    <main id="canvas"></main>
  </div>

  <script id="graph" type="application/json">/*__DEPMAP_GRAPH_JSON__*/</script>
  <!--__DEPMAP_CYTOSCAPE_JS__-->
  <!--__DEPMAP_CYTOSCAPE_FCOSE_JS__-->
  <!--__DEPMAP_CYTOSCAPE_DAGRE_JS__-->
  <script>/*__DEPMAP_VIEWER_JS__*/</script>
</body>
</html>
